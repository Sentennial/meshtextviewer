name: meshtextviewer
services:
  mqtt-to-mongo:
    build: ./mqtt-to-mongo
    restart: unless-stopped
    env_file: "./.env"
    depends_on:
      - mongo
  
  mongo:
    image: mongo
    restart: unless-stopped
    #ports:
    #  - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB}

  mongo-express:
    image: mongo-express
    restart: unless-stopped
    ports:
      - ${MONGO_EX_PORT}:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EX_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EX_PASS}